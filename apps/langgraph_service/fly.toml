app = "nuvora-langgraph"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  PRIMARY_LLM = "openai:gpt-4o-mini"
  FALLBACK_LLM = "anthropic:claude-sonnet-4-5"
  MIN_LOGS_FOR_INSIGHT = "2"
  RATE_LIMIT_DAILY_GIST_PER_DAY = "2"
  RATE_LIMIT_INSIGHT_PER_CATEGORY_PER_DAY = "4"

# Secrets (set via: fly secrets set KEY=value)
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# OPENAI_API_KEY
# ANTHROPIC_API_KEY
# LANGGRAPH_SERVICE_TOKEN

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512